services:
  app:
    image: ${BROKESTACK_IMAGE:-ghcr.io/hrmasss/brokestack:main}
    container_name: brokestack-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:18081:80"
    volumes:
      - /opt/brokestack/data/postgres:/var/lib/postgresql/data
      - /opt/brokestack/data/redis:/var/lib/redis
      - /opt/brokestack/data/browser-state:/srv/brokestack/storage/browser-state
      - /opt/brokestack/data/outputs:/srv/brokestack/storage/outputs
      - /opt/brokestack/backups:/opt/brokestack/backups
