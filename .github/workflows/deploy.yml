name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brokestack_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d brokestack_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/brokestack_ci?sslmode=disable
      REDIS_URL: ""
      GO_ENV: test
      API_ALLOWED_ORIGINS: https://memofi.tech,https://www.memofi.tech,https://app.memofi.tech
      WORKER_URL: http://127.0.0.1:8091
      WORKER_API_BASE_URL: http://127.0.0.1:8080
      WORKER_PUBLIC_BASE_URL: https://app.memofi.tech/worker
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/brokestack
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install worker dependencies
        run: python -m pip install -e apps/worker

      - name: Install Atlas
        run: |
          curl -fsSL https://atlasbinaries.com/atlas/atlas-linux-amd64-latest -o /usr/local/bin/atlas
          chmod +x /usr/local/bin/atlas
          atlas version

      - name: Validate migrations
        run: |
          atlas migrate validate --dir file://db/migrations
          atlas migrate apply --dir file://db/migrations --url "$DATABASE_URL" --tx-mode file --exec-order linear
        shell: bash

      - name: Seed and smoke check
        run: |
          go run ./cmd/server seed-system
          go run ./cmd/server healthcheck
          go test ./...
        working-directory: apps/api
        shell: bash

      - name: Worker checks
        run: |
          python -m unittest discover -s apps/worker/tests -v
          python -m compileall apps/worker/brokestack_worker
        shell: bash

      - name: Typecheck and build frontend
        env:
          VITE_API_URL: https://api.memofi.tech
          VITE_SITE_URL: https://memofi.tech
          VITE_APP_NAME: BrokeStack
        run: |
          pnpm --dir apps/web typecheck
          pnpm --dir apps/web build
        shell: bash

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ env.IMAGE_REPO }}:main
          build-args: |
            VITE_API_URL=https://api.memofi.tech
            VITE_SITE_URL=https://memofi.tech
            VITE_APP_NAME=BrokeStack

      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_brokestack
          chmod 600 ~/.ssh/id_brokestack
          ssh-keyscan -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deploy assets
        shell: bash
        run: |
          ssh -i ~/.ssh/id_brokestack -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" "mkdir -p /opt/brokestack"
          scp -i ~/.ssh/id_brokestack -P "${{ secrets.PROD_SSH_PORT }}" docker-compose.prod.yml scripts/deploy-production.sh "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/opt/brokestack/"
          ssh -i ~/.ssh/id_brokestack -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" "chmod +x /opt/brokestack/deploy-production.sh"

      - name: Upload deploy environment
        shell: bash
        run: |
          {
            printf 'PROD_ENV_FILE_B64=%s\n' '${{ secrets.PROD_ENV_FILE_B64 }}'
            printf 'GHCR_USERNAME=%s\n' '${{ github.actor }}'
            printf 'GHCR_TOKEN=%s\n' '${{ secrets.GITHUB_TOKEN }}'
          } > deploy.env
          scp -i ~/.ssh/id_brokestack -P "${{ secrets.PROD_SSH_PORT }}" deploy.env "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/opt/brokestack/deploy.env"

      - name: Deploy to production
        shell: bash
        run: |
          IMAGE="${IMAGE_REPO}:${GITHUB_SHA}"
          ssh -i ~/.ssh/id_brokestack -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" "
            set -euo pipefail
            set -a
            . /opt/brokestack/deploy.env
            set +a
            /opt/brokestack/deploy-production.sh '$IMAGE'
            rm -f /opt/brokestack/deploy.env
          "

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.PROD_DISCORD_WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ job.status }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "Discord webhook secret is not configured; skipping notification."
            exit 0
          fi

          if [ "${DEPLOY_STATUS}" = "success" ]; then
            COLOR=5763719
          elif [ "${DEPLOY_STATUS}" = "failure" ]; then
            COLOR=15548997
          else
            COLOR=16705372
          fi

          payload=$(cat <<EOF
          {
            "username": "Memofi Deploy",
            "embeds": [
              {
                "title": "Production deployment ${DEPLOY_STATUS}",
                "url": "${WORKFLOW_URL}",
                "color": ${COLOR},
                "fields": [
                  { "name": "Repository", "value": "\`${GITHUB_REPOSITORY}\`", "inline": true },
                  { "name": "Branch", "value": "\`${GITHUB_REF_NAME}\`", "inline": true },
                  { "name": "Actor", "value": "\`${GITHUB_ACTOR}\`", "inline": true },
                  { "name": "Commit", "value": "\`${GITHUB_SHA}\`", "inline": false },
                  { "name": "Workflow", "value": "[Open run](${WORKFLOW_URL})", "inline": false }
                ]
              }
            ]
          }
          EOF
          )

          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "${DISCORD_WEBHOOK_URL}"
